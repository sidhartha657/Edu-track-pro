<!DOCTYPE html>
<html>

<head>
    <title>Student Management</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

    <div class="sidebar">

        <h2>EduTrack Pro</h2>

        <a href="index.html">Dashboard</a>
        <a href="students.html">Students</a>
        <a href="attendance.html">Attendance</a>
        <a href="results.html">Results</a>
        <a href="analytics.html">Analytics</a>

        <button id="themeBtn">
            Dark Mode
        </button>

    </div>

    <div class="content">

        <h1>Student Management</h1>

        <input
        id="name"
        placeholder="Student Name">

        <input
        id="course"
        placeholder="Course">

        <button onclick="addStudent()">
            Add Student
        </button>
<button onclick="exportCSV()">
    Export CSV
</button>

        <hr>

        <input
        id="search"
        placeholder="Search Student">

        <br><br>

        <div id="studentList"></div>

    </div>

</div>

<script>

let students =
JSON.parse(
localStorage.getItem("students")
) || [];

function addStudent(){

    let name =
    document.getElementById("name")
    .value
    .trim();

    let course =
    document.getElementById("course")
    .value
    .trim();

    if(name === "" || course === ""){

        alert(
        "Please enter student name and course"
        );

        return;

    }

    students.push({
        name,
        course
    });

    localStorage.setItem(
    "students",
    JSON.stringify(students)
    );

    document.getElementById("name").value="";
    document.getElementById("course").value="";

    showStudents();

}
function exportCSV(){

    let csv =
    "Name,Course\n";

    students.forEach(student=>{

        csv +=
        student.name +
        "," +
        student.course +
        "\n";

    });

    const blob =
    new Blob([csv],{
        type:"text/csv"
    });

    const link =
    document.createElement("a");

    link.href =
    URL.createObjectURL(blob);

    link.download =
    "students.csv";

    link.click();

}

function showStudents(){

    let search =
    document
    .getElementById("search")
    .value
    .toLowerCase();

    let html = "";

    students
    .filter(student =>

        student.name
        .toLowerCase()
        .includes(search)

        ||

        student.course
        .toLowerCase()
        .includes(search)

    )

    .forEach((student,index)=>{

        html += `

        <div class="card">
<img
src="https://ui-avatars.com/api/?name=${student.name}&background=random"
alt="Student Avatar">


            <h3>${student.name}</h3>

            <p>Course: ${student.course}</p>

            <button onclick="editStudent(${index})">
                Edit
            </button>

            <button onclick="deleteStudent(${index})">
                Delete
            </button>

        </div>

        `;

    });

    if(html === ""){

        html = `
        <div class="card">
            <h3>No Students Found</h3>
        </div>
        `;

    }

    document
    .getElementById("studentList")
    .innerHTML = html;

}

function editStudent(index){

    let newName =
    prompt(
    "Enter New Name",
    students[index].name
    );

    let newCourse =
    prompt(
    "Enter New Course",
    students[index].course
    );

    if(newName && newCourse){

        students[index].name =
        newName;

        students[index].course =
        newCourse;

        localStorage.setItem(
        "students",
        JSON.stringify(students)
        );

        showStudents();

    }

}

function deleteStudent(index){

    if(
    confirm(
    "Are you sure you want to delete this student?"
    )
    ){

        students.splice(index,1);

        localStorage.setItem(
        "students",
        JSON.stringify(students)
        );

        showStudents();

    }

}

document
.getElementById("search")
.addEventListener(
"input",
showStudents
);

showStudents();

</script>

<script src="js/theme.js"></script>

</body>

</html>
